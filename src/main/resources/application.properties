# ── Server ─────────────────────────────────────────────────────────────────
spring.application.name=kalsec-rag
server.port=8080

# ── OpenAI ───────────────────────────────────────────────────────────────────
openai.api-key=${OPEN-API-KEY}
openai.api.base-url=https://api.openai.com
openai.model.chat=gpt-4o-mini
openai.model.embedding=text-embedding-3-small

# ── ChromaDB ─────────────────────────────────────────────────────────────────
# Run ChromaDB locally:  docker run -p 8000:8000 chromadb/chroma
chroma.base-url=http://localhost:8000
chroma.collection.name=kalsec_contract

# ── Ingestion ────────────────────────────────────────────────────────────────
ingest.chunk-size=100
ingest.embed-batch-size=96

# ── Retrieval ────────────────────────────────────────────────────────────────
retrieval.top-k=6

# ── File upload ──────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.kalsec=INFO
logging.level.root=WARN
